version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "dotnet"
    assignees:
      - "AriusII"
    reviewers:
      - "AriusII"
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      aspire:
        patterns:
          - "Aspire.*"

  - package-ecosystem: "npm"
    directory: "/Documentations"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "documentation"
    assignees:
      - "AriusII"
    reviewers:
      - "AriusII"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    assignees:
      - "AriusII"
    reviewers:
      - "AriusII"
