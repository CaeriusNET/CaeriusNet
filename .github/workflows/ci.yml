name: CI

on:
  push:
    branches: [main, 'feature/**']
    paths-ignore:
      - 'Documentations/**'
      - '*.md'
      - '.github/dependabot.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'Documentations/**'
      - '*.md'

# Cancel in-progress runs on the same branch/PR to avoid wasting runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  DOTNET_VERSION: '10.0.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore CaeriusNet.slnx

      - name: Build (Release)
        run: |
          dotnet build CaeriusNet.slnx \
            --configuration Release \
            --no-restore \
            -p:TreatWarningsAsErrors=true \
            -p:WarningLevel=4

      - name: Run tests with coverage
        run: |
          dotnet test CaeriusNet.slnx \
            --configuration Release \
            --no-restore \
            --no-build \
            --filter "FullyQualifiedName!~CaeriusNet.IntegrationTests" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=normal" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: ./coverage/**/coverage.cobertura.xml
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./coverage/**/*.trx
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/**/coverage.cobertura.xml
          flags: unittests
          name: caeriusnet-coverage
          fail_ci_if_error: false
