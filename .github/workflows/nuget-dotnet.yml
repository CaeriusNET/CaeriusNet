name: Dependabot — Version Bump

on:
  push:
    branches: [main]

# Minimal permissions — only needs to write back the version bump commit.
permissions:
  contents: read

concurrency:
  group: dependabot-version-bump-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Bumps the patch version whenever Dependabot merges a dependency-update PR to main.
  # Publishing is handled exclusively by the manual release.yml workflow.
  bump-version:
    name: Bump Patch Version (Dependabot only)
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          VERSION=$(grep -oP '(?<=<Version>)\d+\.\d+\.\d+(?=</Version>)' Src/CaeriusNet.csproj)
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW="${MAJOR}.${MINOR}.$((PATCH+1))"
          sed -i "s|<Version>${VERSION}</Version>|<Version>${NEW}</Version>|g" Src/CaeriusNet.csproj
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"
          echo "🔖 Bumped: ${VERSION} → ${NEW}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Src/CaeriusNet.csproj
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push
