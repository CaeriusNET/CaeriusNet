name: Build and Publish CaeriusNet

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_increment:
        description: 'Version increment type'
        required: false
        default: 'none'
        type: choice
        options:
          - none
          - patch
          - minor
          - major

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  bump-version:
    name: Bump Version (Dependabot)
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump Patch Version
        id: bump
        run: |
          VERSION=$(grep -oP '(?<=<Version>)\d+\.\d+\.\d+(?=</Version>)' Src/CaeriusNet.csproj)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION=$(echo $VERSION | sed "s/\.[0-9]*$/.$NEW_PATCH/")
          sed -i "s|<Version>$VERSION</Version>|<Version>$NEW_VERSION</Version>|g" Src/CaeriusNet.csproj
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and Push Version Bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Src/CaeriusNet.csproj
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    needs: [bump-version]
    if: always() && (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore Dependencies
        run: dotnet restore CaeriusNet.slnx

      - name: Build
        run: dotnet build CaeriusNet.slnx --configuration Release --no-restore

      - name: Run Tests
        run: |
          dotnet test CaeriusNet.slnx \
            --configuration Release \
            --no-restore \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "console;verbosity=normal"

  build:
    name: Build and Pack
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && needs.test.result == 'success'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore Dependencies
        run: dotnet restore Src/CaeriusNet.csproj

      - name: Build CaeriusNet
        run: dotnet build Src/CaeriusNet.csproj --configuration Release --no-restore

      - name: Pack CaeriusNet (nupkg + snupkg)
        run: >
          dotnet pack Src/CaeriusNet.csproj
          --configuration Release
          --no-build
          --output ./packages
          -p:IncludeSymbols=true
          -p:SymbolPackageFormat=snupkg

      - name: Upload Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: caeriusnet-packages
          path: ./packages/
          retention-days: 7

  publish:
    name: Publish to NuGet
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download Package Artifacts
        uses: actions/download-artifact@v4
        with:
          name: caeriusnet-packages
          path: ./packages

      - name: Publish CaeriusNet to NuGet
        run: |
          dotnet nuget push ./packages/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push ./packages/*.snupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate || true