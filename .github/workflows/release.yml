name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      release_notes:
        description: 'Release notes (leave empty to auto-generate from commits)'
        required: false
        type: string

# Only one release at a time — never cancel an in-progress release.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  DOTNET_VERSION: '10.0.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    name: Release → Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ── Guard: must be triggered from main ─────────────────────────────────────
      - name: Validate — main branch only
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "❌ Release must be triggered from the 'main' branch."
            echo "   Current ref: ${{ github.ref }}"
            exit 1
          fi
          echo "✅ Running on main."

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node
        if: hashFiles('Documentations/package.json') != ''
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Documentations/package*.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-release-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: nuget-release-${{ runner.os }}-

      # ── Bump version in .csproj ─────────────────────────────────────────────────
      - name: Bump version
        id: bump
        run: |
          CURRENT=$(grep -oP '(?<=<Version>)\d+\.\d+\.\d+(?=</Version>)' Src/CaeriusNet.csproj)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          case "${{ github.event.inputs.version_bump }}" in
            major) NEW="$((MAJOR+1)).0.0" ;;
            minor) NEW="${MAJOR}.$((MINOR+1)).0" ;;
            patch) NEW="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
          esac

          sed -i "s|<Version>${CURRENT}</Version>|<Version>${NEW}</Version>|g" Src/CaeriusNet.csproj

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW"         >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW}"      >> "$GITHUB_OUTPUT"
          echo "🔖 Version bump: ${CURRENT} → ${NEW} (${{ github.event.inputs.version_bump }})"

      - name: Validate release metadata
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "❌ CHANGELOG.md is required before publishing a release."
            exit 1
          fi
          if ! grep -q '^## \[Unreleased\]' CHANGELOG.md; then
            echo "❌ CHANGELOG.md must contain an [Unreleased] section before release."
            exit 1
          fi
          if [ -z "${{ github.event.inputs.release_notes }}" ]; then
            echo "ℹ️  No manual release notes supplied; GitHub release notes will be generated from commits."
          fi

      # ── Build & Test (gates on the new version) ────────────────────────────────
      - name: Restore
        run: dotnet restore CaeriusNet.slnx

      - name: Build (Release)
        run: |
          dotnet build CaeriusNet.slnx \
            --configuration Release \
            --no-restore \
            -p:TreatWarningsAsErrors=true \
            -p:WarningLevel=4

      - name: Test (non-integration)
        run: |
          dotnet test CaeriusNet.slnx \
            --configuration Release \
            --no-restore \
            --no-build \
            --filter "FullyQualifiedName!~IntegrationTests" \
            --logger "console;verbosity=normal"

      - name: Test (integration, Docker)
        run: |
          dotnet test Tests/CaeriusNet.IntegrationTests/CaeriusNet.IntegrationTests.csproj \
            --configuration Release \
            --no-restore \
            --no-build \
            --logger "console;verbosity=normal"

      - name: Install docs dependencies
        if: hashFiles('Documentations/package.json') != '' && hashFiles('Documentations/package-lock.json') == ''
        working-directory: Documentations
        run: npm install

      - name: Install locked docs dependencies
        if: hashFiles('Documentations/package-lock.json') != ''
        working-directory: Documentations
        run: npm ci

      - name: Build docs
        if: hashFiles('Documentations/package.json') != ''
        working-directory: Documentations
        run: npm run docs:build

      # ── Pack ────────────────────────────────────────────────────────────────────
      - name: Pack (nupkg + snupkg)
        run: |
          dotnet pack Src/CaeriusNet.csproj \
            --configuration Release \
            --no-build \
            --output ./packages \
            -p:IncludeSymbols=true \
            -p:SymbolPackageFormat=snupkg

      - name: Validate package contents
        shell: pwsh
        run: ./eng/ValidatePackage.ps1 -Configuration Release -OutputDirectory artifacts/package-validation

      - name: List packages
        run: ls -la ./packages/

      # ── Publish → NuGet.org ────────────────────────────────────────────────────
      - name: Publish → NuGet.org
        run: |
          dotnet nuget push ./packages/*.nupkg \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push ./packages/*.snupkg \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate || true

      # ── Publish → GitHub Packages ──────────────────────────────────────────────
      - name: Publish → GitHub Packages
        run: |
          dotnet nuget push ./packages/*.nupkg \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --skip-duplicate
          dotnet nuget push ./packages/*.snupkg \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --skip-duplicate || true

      # ── Commit version bump back to main ───────────────────────────────────────
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Src/CaeriusNet.csproj
          git commit -m "chore: release v${{ steps.bump.outputs.new }} [skip ci]"
          git push
          echo "✅ Version bump committed: ${{ steps.bump.outputs.new }}"

      # ── Create GitHub Release (triggers benchmark.yml automatically) ───────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          VERSION="${{ steps.bump.outputs.new }}"
          NOTES="${{ github.event.inputs.release_notes }}"
          ASSETS=$(ls ./packages/*.nupkg ./packages/*.snupkg 2>/dev/null | tr '\n' ' ')

          if gh release view "${TAG}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "ℹ️  Release ${TAG} already exists — skipping."
          else
            if [ -n "$NOTES" ]; then
              # shellcheck disable=SC2086
              gh release create "${TAG}" \
                --title "CaeriusNet ${VERSION}" \
                --notes "${NOTES}" \
                --repo "$GITHUB_REPOSITORY" \
                ${ASSETS}
            else
              # shellcheck disable=SC2086
              gh release create "${TAG}" \
                --title "CaeriusNet ${VERSION}" \
                --generate-notes \
                --repo "$GITHUB_REPOSITORY" \
                ${ASSETS}
            fi
            echo "✅ Release ${TAG} created — benchmark workflow will trigger automatically."
          fi
