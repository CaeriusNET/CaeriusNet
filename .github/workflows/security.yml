name: Security Audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'  # Monday 04:00 UTC

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  dependency-review:
    name: Dependency Review (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always

  vulnerability-scan:
    name: Vulnerable Package Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Display .NET SDK info
        run: dotnet --info

      - name: Restore dependencies
        run: dotnet restore CaeriusNet.slnx

      - name: Scan for vulnerable packages (distributed projects)
        run: |
          set -euo pipefail

          projects=(
            "Src/CaeriusNet.csproj|CaeriusNet"
            "Tools/CaeriusNet.SqlServer.Contracts/CaeriusNet.SqlServer.Contracts.csproj|CaeriusNet AutoContracts tool"
            "Analyzer/CaeriusNet.Analyzer.csproj|CaeriusNet.Analyzer"
            "SourceGenerators/CaeriusNet.Generator.csproj|CaeriusNet.Generator"
          )

          total_vulnerabilities=0
          for item in "${projects[@]}"; do
            IFS='|' read -r project label <<< "$item"
            echo "=== Scanning ${project} for vulnerabilities ==="
            result=$(dotnet list "$project" package --vulnerable --include-transitive --format json 2>&1)
            echo "$result"
            count=$(echo "$result" | jq '[.projects[]? | (.frameworks // [])[] | ((.topLevelPackages // [])[], (.transitivePackages // [])[]) | select((.vulnerabilities // []) | length > 0)] | length')
            if [ "$count" -gt 0 ]; then
              echo "::error title=Vulnerable Packages::${count} vulnerable NuGet package(s) detected in ${label}. See log for details."
              total_vulnerabilities=$((total_vulnerabilities + count))
            else
              echo "No vulnerable packages found in ${label}."
            fi
          done

          if [ "$total_vulnerabilities" -gt 0 ]; then
            exit 1
          fi

      - name: Scan for vulnerable packages (full solution, informational)
        run: |
          echo "=== Scanning all solution projects for vulnerabilities (non-blocking) ==="
          dotnet list CaeriusNet.slnx package --vulnerable --include-transitive --format json || true

      - name: Report outdated packages (informational)
        run: |
          echo "=== Outdated packages (informational, non-blocking) ==="
          dotnet list CaeriusNet.slnx package --outdated || true
          echo "=== Deprecated packages (informational, non-blocking) ==="
          dotnet list CaeriusNet.slnx package --deprecated --include-transitive || true
        continue-on-error: true
